<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ครู AI ในห้องเรียน</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; font-family: 'Kanit', sans-serif; }
    model-viewer { width: 100vw; height: 100vh; background: #f0f0f0; }
    .ui-container { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 10; }
    #ask-btn { padding: 15px 30px; font-size: 18px; background: #2563eb; color: white; border: none; border-radius: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; }
  </style>
</head>
<body>

  <model-viewer 
    id="model"
    src="ใส่_URL_โมเดลจาก_Assets_ตรงนี้" 
    ar ar-modes="webxr scene-viewer quick-look" 
    camera-controls poster="loading.png" shadow-intensity="1">
    <div class="ui-container">
      <button id="ask-btn">แตะเพื่อถามครู AI</button>
    </div>
  </model-viewer>

  <script>
    const apiKey = "ใส่_API_KEY_GEMINI_ตรงนี้";
    const btn = document.getElementById('ask-btn');

    btn.onclick = async () => {
      const question = prompt("นักเรียนอยากถามอะไรครับ?");
      if (!question) return;

      btn.innerText = "กำลังคิด...";
      
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: `คุณคือครูใจดีที่อยู่ในร่าง 3D นี้ จงตอบคำถามนักเรียนเป็นภาษาไทยแบบสั้นๆ: ${question}` }] }]
          })
        });

        const data = await response.json();
        const answer = data.candidates[0].content.parts[0].text;

        // สั่งให้มือถือพูด
        const speech = new SpeechSynthesisUtterance(answer);
        speech.lang = 'th-TH';
        window.speechSynthesis.speak(speech);

        alert("คำตอบ: " + answer);
      } catch (error) {
        alert("ขออภัย ระบบขัดข้อง ลองใหม่อีกครั้งนะครับ");
      } finally {
        btn.innerText = "แตะเพื่อถามครู AI";
      }
    };
  </script>
</body>
</html>
